services:
  - type: web
    name: cartsphere-ecommerce
    runtime: node
    rootDir: .
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 5000
      - key: CORS_ORIGIN
        sync: false
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false
